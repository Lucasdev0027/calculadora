<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <main class="page">
    <div class="calculator" role="application" aria-label="Calculator">
      <div class="display" aria-live="polite">
        <div class="display__previous" id="previousOperand"></div>
        <div class="display__current" id="currentOperand">0</div>
      </div>

      <div class="keys" id="keys">
        <button class="btn btn--wide" data-action="clear" aria-label="Clear">C</button>
        <button class="btn" data-action="operator" data-value="÷" aria-label="Divide">÷</button>
        <button class="btn" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <button class="btn" data-number="7">7</button>
        <button class="btn" data-number="8">8</button>
        <button class="btn" data-number="9">9</button>
        <button class="btn" data-action="operator" data-value="−" aria-label="Subtract">−</button>

        <button class="btn" data-number="4">4</button>
        <button class="btn" data-number="5">5</button>
        <button class="btn" data-number="6">6</button>
        <button class="btn" data-action="operator" data-value="+" aria-label="Add">+</button>

        <button class="btn" data-number="1">1</button>
        <button class="btn" data-number="2">2</button>
        <button class="btn" data-number="3">3</button>
        <button class="btn btn--tall" data-action="equals" aria-label="Equals">=</button>

        <button class="btn btn--wide" data-number="0">0</button>
        <button class="btn" data-action="decimal" aria-label="Decimal">.</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
</body>
</html>
