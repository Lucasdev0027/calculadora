<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Cronômetro</h1>
        <div class="display">00:00:00</div>
        <div class="buttons">
            <button id="start" onclick="start()">Iniciar</button>
            <button id="pause" onclick="pause()">Pausar</button>
            <button id="reset" onclick="reset()">Reiniciar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
